name: Build and Deploy Multi-Provider RADIO

on:
  push:
    branches:
      - main
      - 'release/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  MULTITENANT_ENABLED: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          
      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./internal/tenant/... ./internal/middleware/... ./internal/radiusd/...
        
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$VERSION" = "$GITHUB_REF" ]; then
            if [ "${{ github.event.inputs.environment }}" = "production" ]; then
              VERSION="${{ github.event.inputs.environment }}-$(date +%Y%m%d%H%M%S)"
            else
              VERSION="${{ github.event.inputs.environment }}-$(date +%Y%m%d)-$(echo $GITHUB_SHA | cut -c1-7)"
            fi
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "image=${REGISTRY}/${IMAGE_NAME}:${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/toughradius
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            MULTITENANT_ENABLED=true

      - name: Print image digest
        run: |
          echo "Docker image built and pushed successfully!"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/toughradius:${{ steps.version.outputs.version }}"

  deploy-staging:
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Trigger Coolify Staging Deploy
        run: |
          curl -X POST "${{ secrets.COOLIFY_STAGING_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Coolify-Secret: ${{ secrets.COOLIFY_SECRET }}" \
            -d '{
              "deployment_id": "${{ github.run_id }}",
              "image": "${{ needs.build-and-push.outputs.image }}",
              "version": "${{ needs.build-and-push.outputs.version }}",
              "branch": "${{ github.ref_name }}",
              "commit": "${{ github.sha }}",
              "commit_message": "${{ github.event.head_commit.message }}",
              "triggered_by": "github_actions"
            }'

      - name: Wait for deployment
        run: sleep 60
          
      - name: Verify deployment
        run: |
          echo "Checking deployment status..."
          curl -f "${{ secrets.STAGING_URL }}/ready" || exit 1

  deploy-production:
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Trigger Coolify Production Deploy
        run: |
          curl -X POST "${{ secrets.COOLIFY_PRODUCTION_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Coolify-Secret: ${{ secrets.COOLIFY_SECRET }}" \
            -d '{
              "deployment_id": "${{ github.run_id }}",
              "image": "${{ needs.build-and-push.outputs.image }}",
              "version": "${{ needs.build-and-push.outputs.version }}",
              "tag": "${{ github.ref_name }}",
              "commit": "${{ github.sha }}",
              "triggered_by": "github_actions"
            }'

      - name: Notify success
        if: success()
        run: |
          echo "Deployment triggered successfully"
          
      - name: Notify failure
        if: failure()
        run: |
          echo "Deployment failed. Check Coolify dashboard."
