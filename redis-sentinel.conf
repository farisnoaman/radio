# Redis Sentinel Configuration for Multi-Provider RADIO
# Place this file alongside docker-compose.prod.yml

# Sentinel Configuration
port 26379

# Replication
sentinel monitor mymaster redis 6379 2
sentinel down-after-milliseconds mymaster 3000
sentinel parallel-syncs mymaster 1
sentinel failover-timeout mymaster 18000

# Security (uncomment and set password if Redis requires auth)
# requirepass your-redis-password
# sentinel auth-pass mymaster your-redis-password

# Logging
loglevel notice
logfile ""

# Other settings
daemonize no
pidfile /var/run/redis-sentinel.pid
dir /data
