version: '3.8'
services:
  toughradius:
    image: farisnoaman/toughradius:latest
    ports:
      - "1816:1816"
      - "1812:1812"
      - "1813:1813"
      - "2083:2083"
    environment:
      - TOUGHRADIUS_SYSTEM_DOMAIN=https://your-domain.com
      - TOUGHRADIUS_WEB_SECRET=change-this-to-random-secret-min-32-chars
      - TOUGHRADIUS_LOGGER_MODE=production
      - TOUGHRADIUS_SYSTEM_DEBUG=false
      
      # Database Configuration
      - TOUGHRADIUS_DB_TYPE=postgres
      - TOUGHRADIUS_DB_HOST=postgres
      - TOUGHRADIUS_DB_PORT=5432
      - TOUGHRADIUS_DB_NAME=toughradius
      - TOUGHRADIUS_DB_USER=toughradius
      - TOUGHRADIUS_DB_PASSWD=strong_password_here
      - TOUGHRADIUS_DB_MAX_CONN=200
      - TOUGHRADIUS_DB_IDLE_CONN=20
      
      # Multi-Tenant & Cache Configuration
      - TOUGHRADIUS_MULTITENANT_ENABLED=true
      - TOUGHRADIUS_CACHE_L1_ENABLED=true
      - TOUGHRADIUS_CACHE_L1_MAX_ENTRIES=10000
      - TOUGHRADIUS_CACHE_L2_ENABLED=true
      - TOUGHRADIUS_REDIS_HOST=redis
      - TOUGHRADIUS_REDIS_PORT=6379
      - TOUGHRADIUS_CACHE_USER_TTL=30
      - TOUGHRADIUS_CACHE_NAS_TTL=300
      - TOUGHRADIUS_CACHE_SESSION_TTL=5
      
      # Scale Configuration
      - TOUGHRADIUS_CACHE_PROVIDER_COUNT=100
      - TOUGHRADIUS_CACHE_USERS_PER_PROVIDER=5000
      - TOUGHRADIUS_CACHE_CONCURRENT_PER_PROVIDER=1500
    volumes:
      - toughradius_data:/var/toughradius
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1816/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=toughradius
      - POSTGRES_USER=toughradius
      - POSTGRES_PASSWORD=strong_password_here
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toughradius"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
      --activerehashing yes
      --hz 10
      --dynamic-hz yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  toughradius_data:
  postgres_data:
  redis_data:
