# Multi-Provider Cache Configuration
# For 100 providers × 5000 users × 1500 concurrent per provider

cache:
  # L1 Cache (Local Memory) - Fast access for hot data
  l1_enabled: true
  l1_max_entries: 10000
  
  # L2 Cache (Redis) - Distributed cache for multi-instance deployments
  l2_enabled: true
  l2_redis_db: 0
  
  # Cache TTL settings (in seconds)
  user_ttl: 30          # User data cache TTL
  nas_ttl: 300          # NAS device cache TTL  
  session_ttl: 5        # Session count cache TTL (short for accuracy)
  voucher_ttl: 120      # Voucher data cache TTL
  
  # Scale Configuration
  provider_count: 100
  users_per_provider: 5000
  concurrent_per_provider: 1500
